<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="Product image placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#fff8e1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="48" y="72" width="704" height="256" fill="none" stroke="#b0bec5" stroke-width="3" stroke-dasharray="14 10" rx="18"/>
  <g fill="#78909c" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <text x="400" y="200">Product photo</text>
    <text x="400" y="236" font-size="15" font-weight="600" fill="#90a4ae">Set img src to URL or path</text>
  </g>
